<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activa tu Tienda - AUMVEN Pro</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Nunito', sans-serif; background: #0b0a13; color: #eeeeee; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px rgba(255,255,255,0.08) solid; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center justify-center">
    <div class="w-full max-w-xl text-center mb-6">
        <div class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 mb-2">🎈 AUMVEN PRO 🎈</div>
        <p class="text-gray-400">Completa los datos de tu negocio en 3 simples pasos guiados</p>
    </div>
    <div class="w-full max-w-xl glass rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
        <!-- PASO 1: DATOS BÁSICOS -->
        <div id="step-1" class="space-y-5">
            <h2 class="text-xl font-bold text-pink-400 flex items-center gap-2">🏪 Paso 1: Datos del Negocio</h2>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nombre del Negocio</label>
                <input type="text" id="biz-name" placeholder="Ej: Almacén Don Pedro" class="w-full bg-black/40 border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-pink-500 text-white">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">WhatsApp del Negocio (Con código de país)</label>
                <input type="text" id="biz-phone" placeholder="Ej: 56912345678" class="w-full bg-black/40 border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-pink-500 text-white">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Tipo de Negocio</label>
                <select id="biz-type" class="w-full bg-black/40 border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-pink-500 text-white">
                    <option value="" disabled selected>Selecciona tu tipo de negocio</option>
                    <option value="Almacén">Almacén / Minimarket</option>
                    <option value="Botillería">Botillería</option>
                    <option value="Restaurant">Restaurant / Cafetería</option>
                    <option value="Otro">Otro Comercio Local</option>
                </select>
            </div>
            <button onclick="irPaso2()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 font-bold p-4 rounded-xl shadow-lg transition duration-200 mt-4">Siguiente Paso ➔</button>
        </div>

        <!-- PASO 2: CONFIGURACIÓN JUEGO Y PREMIOS -->
        <div id="step-2" class="space-y-5 hidden">
            <h2 class="text-xl font-bold text-pink-400 flex items-center gap-2">🎮 Paso 2: Tu Tómbola Digital</h2>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Selecciona el Juego para tus Clientes</label>
                <select id="biz-game" class="w-full bg-black/40 border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-pink-500 text-white">
                    <option value="globos" selected>💥 Reventar Globos Digitales</option>
                    <option value="cofres">🏴‍☠️ Abrir Cofres del Tesoro</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Premios Principales (Separados por comas)</label>
                <input type="text" id="biz-prizes" placeholder="Ej: 10% Dscto, Bebida Gratis" class="w-full bg-black/40 border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-pink-500 text-white">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Premio de Consolación</label>
                <input type="text" id="biz-consolation" placeholder="Ej: Sigue participando" class="w-full bg-black/40 border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-pink-500 text-white">
            </div>
            <button onclick="irPaso3()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 font-bold p-4 rounded-xl shadow-lg transition duration-200 mt-4">Finalizar y Activar Tienda 🚀</button>
        </div>

        <!-- PASO 3: ÉXITO AUTOMÁTICO Y LINKS -->
        <div id="step-3" class="space-y-6 hidden text-center py-4">
            <div class="w-16 h-16 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center text-3xl mx-auto mb-2 animate-bounce">✓</div>
            <h2 class="text-2xl font-black text-green-400">¡Tienda Activada con Éxito!</h2>
            <div class="bg-purple-950/40 p-4 rounded-2xl border border-purple-500/30 text-left space-y-3">
                <div>
                    <span class="text-xs text-purple-300 font-bold block uppercase mb-1">🔗 Link de Juego para tus Clientes:</span>
                    <a id="res-game-link" href="#" target="_blank" class="text-pink-400 underline font-semibold break-all text-sm">Cargando...</a>
                </div>
                <hr class="border-purple-500/20">
                <div>
                    <span class="text-xs text-purple-300 font-bold block uppercase mb-1">🎛️ Tu Panel de Métricas y Excel:</span>
                    <a id="res-admin-link" href="#" target="_blank" class="text-pink-400 underline font-semibold break-all text-sm">Cargando...</a>
                </div>
            </div>
            <a id="res-btn-admin" href="#" target="_blank" class="block w-full bg-purple-600 hover:bg-purple-700 font-bold p-4 rounded-xl text-center text-white">Ir Directo a mi Panel Admin ➔</a>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmb3Njemhzem91dWt5cHN2YXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4Nzk0MDQsImV4cCI6MjAzMjQ1NTQwNH0.iUzdXBhYmFzZStC6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmb3Njemhzem91dWt5cHN2YXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4Nzk0MDQsImV4cCI6MjAzMjQ1NTQwNH0.eYJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmb3Njemhzem91dWt5cHN2YXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4Nzk0MDQsImV4cCI6MjAzMjQ1NTQwNH0.mNjemhzem91dWt5cHN2YXN4Iiwiicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4Nzk0MDQsImV4cCI6MjAzMjQ1NTQwNH0.eYJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmb3Njemhzem91dWt5cHN2YXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4Nzk0MDQsImV4cCI6MjAzMjQ1NTQwNH0";
        const BASE_URL = "https://aumven.cl";
        const ADMIN_BASE_URL = "https://aumven.cl";
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function irPaso2() {
            const name = document.getElementById('biz-name').value.trim();
            const phone = document.getElementById('biz-phone').value.trim();
            const type = document.getElementById('biz-type').value;
            if (!name || !phone || !type) { alert('Por favor, completa los campos obligatorios.'); return; }
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        async function irPaso3() {
            const name = document.getElementById('biz-name').value.trim();
            const phone = document.getElementById('biz-phone').value.trim();
            const game = document.getElementById('biz-game').value;
            const prizes = document.getElementById('biz-prizes').value.trim();
            const consolation = document.getElementById('biz-consolation').value.trim() || 'Sigue participando';
            if (!prizes) { alert('Ingresa los premios.'); return; }

            const cleanSlug = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            const uniqueID = Math.random().toString(36).substring(2, 6);
            const slugFinal = `${cleanSlug}-${uniqueID}`;
            const prefix = cleanSlug.substring(0, 3).toUpperCase() || 'AUM';

            try {
                const { error } = await sb.from('configuraciones').insert([{
                    nombre: name, juego: game, premios: prizes, consolacion: consolation, wa: phone, prefijo: prefix, meta: 5000, adicional: 2000, activo: true
                }]);
                if (error) throw error;

                const finalGameLink = `${BASE_URL}?neg=${slugFinal}`;
                const finalAdminLink = `${ADMIN_BASE_URL}?neg=${slugFinal}`;

                document.getElementById('res-game-link').innerText = finalGameLink;
                document.getElementById('res-game-link').href = finalGameLink;
                document.getElementById('res-admin-link').innerText = finalAdminLink;
                document.getElementById('res-admin-link').href = finalAdminLink;
                document.getElementById('res-btn-admin').href = finalAdminLink;

                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
            } catch (err) { console.error(err); alert('Error de base de datos.'); }
        }
    </script>
</body>
</html>
