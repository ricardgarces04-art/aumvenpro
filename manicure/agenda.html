<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva tu Hora Premium</title>
<link rel="stylesheet" href="https://googleapis.com">
<!-- MAPA DE LEAFLET NATIVO GRATUITO -->
<link rel="stylesheet" href="https://unpkg.com" />
<script src="https://unpkg.com"></script>
<style>
  :root { --cream: #FBF3EE; --blush: #F5DFD9; --coffee: #4A342E; --coffeesoft: #6B5049; --siena: #AD6B5F; --white: #FFFFFF; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background-color: var(--cream); color: var(--coffee); padding: 20px 12px; }
  .wrapper { max-width: 480px; margin: 0 auto; background: var(--white); padding: 24px; border-radius: 24px; box-shadow: 0 4px 20px rgba(74,52,46,0.06); text-align: center; }
  .logo-header { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: var(--blush); margin: 0 auto 16px; display: block; border: 2px solid var(--siena); }
  h1 { font-family: 'Fraunces', serif; font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: var(--coffeesoft); font-size: 14px; margin-bottom: 24px; }
  .form-group { text-align: left; margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .form-input, select { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #E5D9D3; background: var(--white); font-size: 14px; color: var(--coffee); outline: none; }
  #map { height: 200px; border-radius: 16px; margin-top: 12px; border: 1px solid #E5D9D3; display: none; }
  .total-box { background: var(--cream); padding: 16px; border-radius: 16px; margin-top: 24px; font-weight: bold; text-align: right; font-size: 16px; }
  .btn-submit { background: var(--siena); color: var(--white); border: none; padding: 16px; border-radius: 999px; width: 100%; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 16px; transition: 0.2s; }
  .btn-submit:hover { background: #8F4F45; }
</style>
</head>
<body>

<div class="wrapper">
  <!-- MARCA BLANCA DINÁMICA -->
  <img id="app-logo" src="https://unsplash.com" class="logo-header" alt="Logo">
  <h1 id="app-nombre">Cargando agenda...</h1>
  <p class="subtitle">Asegura tu cupo abonando directo a CuentaRUT</p>

  <form id="agendaForm" onsubmit="guardarCita(event)">
    <div class="form-group">
      <label>Tu Correo</label>
      <input id="c-email" class="form-input" type="email" required placeholder="ejemplo@correo.com">
    </div>
    <div class="form-group">
      <label>Tu WhatsApp</label>
      <input id="c-phone" class="form-input" type="tel" required placeholder="+56 9 1234 5678">
    </div>

    <!-- SECTOR VIÁTICOS AUTOMÁTICOS -->
    <div id="contenedor-viatico" style="display: none;" class="form-group">
      <label>¿En qué comuna te atendemos? (Servicio a domicilio)</label>
      <select id="selector-comuna" onchange="actualizarMapaYPrecio()">
        <option value="" data-monto="0" data-lat="0" data-lng="0">-- Selecciona tu comuna --</option>
      </select>
      <div id="map"></div>
    </div>

    <div class="total-box">
      Base Servicio: $18.000 CLP<br>
      <span id="txt-viatico" style="font-weight: normal; font-size: 14px; color: var(--siena);">Viático traslado: +$0</span>
      <div style="font-size: 20px; margin-top: 6px; color: var(--coffee);">Total Abono: <span id="monto-total">$18.000</span></div>
    </div>

    <button type="submit" class="btn-submit">Confirmar y Ver Datos CuentaRUT</button>
  </form>
</div>

<script>
  // CREDENCIALES REALES UNIFICADAS Y PURIFICADAS SIN PLACEHOLDERS
  const CONFIG_URL = "https://supabase.co";
  const CONFIG_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmb3Njemhzem91dWlreXBzdnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTA0NjAsImV4cCI6MjA5NTUyNjQ2MH0.U8M0v_Csc7p2f_mPq1wZOf7T6uI3v5v_wH2b3c4d5e6";
  
  // ID Piloto por defecto de tu negocio de manicure
  const NEGOCIO_ID = "wfosczhzszouukypsvasx"; 
  let map, marker;
  let precioBase = 18000;

  // 1. CARGAR MARCA BLANCA EN VIVO (LOGO Y NOMBRE)
  async function cargarMarcaBlanca() {
    try {
      const response = await fetch(`${CONFIG_URL}/rest/v1/negocios?id=eq.${NEGOCIO_ID}`, {
        method: 'GET',
        headers: { 'apikey': CONFIG_KEY, 'Authorization': `Bearer ${CONFIG_KEY}` }
      });
      const data = await response.json();
      if (data && data.length > 0) {
        document.getElementById('app-nombre').textContent = data[0].nombre || "Agenda Manicure Premium";
        if (data[0].logo_url) {
          document.getElementById('app-logo').src = data[0].logo_url;
        }
      }
    } catch (err) {
      document.getElementById('app-nombre').textContent = "Agenda Manicure Premium";
    }
  }

  // 2. CARGAR VIÁTICOS Y COMUNAS DESDE TU NUEVA TABLA
  async function cargarViaticos() {
    try {
      const response = await fetch(`${CONFIG_URL}/rest/v1/viaticos_comuna?negocio_id=eq.${NEGOCIO_ID}`, {
        method: 'GET',
        headers: { 'apikey': CONFIG_KEY, 'Authorization': `Bearer ${CONFIG_KEY}` }
      });
      const data = await response.json();
      if (data && data.length > 0) {
        const selector = document.getElementById('selector-comuna');
        data.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v.id;
          opt.textContent = `${v.comuna} (+$${Number(v.monto).toLocaleString('es-CL')})`;
          opt.setAttribute('data-monto', v.monto);
          
          // Coordenadas fijas por comuna chilena (o por defecto si el script SQL no las traía)
          opt.setAttribute('data-lat', v.latitud || -33.0486); 
          opt.setAttribute('data-lng', v.longitud || -71.4422);
          selector.appendChild(opt);
        });
        document.getElementById('contenedor-viatico').style.display = 'block';
      }
    } catch (err) {
      console.error("Error leyendo catálogo de viáticos:", err);
    }
  }

  // 3. LOGICA DEL SELECTOR Y MAPA INTERACTIVO LEAFLET
  function actualizarMapaYPrecio() {
    const selector = document.getElementById('selector-comuna');
    const optSeleccionada = selector.options[selector.selectedIndex];
    const viatico = Number(optSeleccionada.getAttribute('data-monto')) || 0;
    const lat = Number(optSeleccionada.getAttribute('data-lat'));
    const lng = Number(optSeleccionada.getAttribute('data-lng'));

    // Calcular montos en CuentaRUT
    document.getElementById('txt-viatico').textContent = `Viático traslado: +$${viatico.toLocaleString('es-CL')}`;
    document.getElementById('monto-total').textContent = `$${(precioBase + viatico).toLocaleString('es-CL')}`;

    // Desplegar y mover el mapa Leaflet interactivo gratis
    if (lat !== 0 && lng !== 0) {
      document.getElementById('map').style.display = 'block';
      if (!map) {
        map = L.map('map').setView([lat, lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        marker = L.marker([lat, lng]).addTo(map);
      } else {
        map.setView([lat, lng], 13);
        marker.setLatLng([lat, lng]);
        setTimeout(() => map.invalidateSize(), 200);
      }
    } else {
      document.getElementById('map').style.display = 'none';
    }
  }

  // 4. GUARDAR RESERVA COMPLETA CON TELEGRAM
  async function guardarCita(e) {
    e.preventDefault();
    const email = document.getElementById('c-email').value.trim();
    const phone = document.getElementById('c-phone').value.trim();
    const selector = document.getElementById('selector-comuna');
    const comunaTexto = selector.options[selector.selectedIndex].text.split(' (')[0];
    const viaticoValor = Number(selector.options[selector.selectedIndex].getAttribute('data-monto')) || 0;

    try {
      const response = await fetch(`${CONFIG_URL}/rest/v1/citas`, {
        method: 'POST',
        headers: {
          'apikey': CONFIG_KEY,
          'Authorization': `Bearer ${CONFIG_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          negocio_id: NEGOCIO_ID,
          telefono: phone,
          servicio: "Manicure Completa",
          monto_abono: precioBase + viaticoValor,
          comuna: viaticoValor > 0 ? comunaTexto : "Home Studio",
          viatico_monto: viaticoValor,
          estado: "pendiente"
        })
      });

      if (!response.ok) throw new Error("Error en Supabase");

      alert("¡Reserva solicitada! Revisa los datos de CuentaRUT para realizar tu transferencia y activar tu hora.");
      // Redirigir o simular el flujo comercial de Telegram que armó Claude
      window.location.href = `https://t.me`; 

    } catch (err) {
      alert("No pudimos conectar con el servidor. Intenta nuevamente.");
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    cargarMarcaBlanca();
    cargarViaticos();
  });
</script>
</body>
</html>
